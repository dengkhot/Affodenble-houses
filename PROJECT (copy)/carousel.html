<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="css/bootstrap.css">

    <script src="/js/bootstrap.js"></script>
</head>
<body>
    
    <!-- carousel -->
     
    <section class="row">
        <!-- colomn -->
        <div class="col-md-12">
            <!-- wrapper class -->
            <div class="corousel slide" data-bs-ride="carounsel" id="mycarousel">
                <div class="carousel-inner" style="max-height: 590px;">
                    <div class="corousel-item active">
                        <div class="d-flex justify-content-center align-content-center h-230 w-230">
                            <img src="images (copy)/B1.jpeg" alt="slide 1 " height="400px" width="400px">

                        </div>
                        
                    </div>
                    <div class="carousel-item">
                        <div class="d-flex justify-content-center align-content-center h-400 w-400">
                            <img src="images (copy)/B2.jpeg" alt="slide2 " height="230px" width="400px">
                        </div>
                    </div>
                    <div class="carousel-item" class="active">
                        <div class="d-flex justify-content-center align-content-center h-230 w-230">
                            <img src="images (copy)/B3.jpeg" alt="silde 3" height="400px" width="400px">
                        </div>
                    </div>
                    <div class="carousel-item">
                        <div class="d-flex justify-content-center align-content-center h-230 w-230">
                            <img src="images (copy)/B4.jpeg" alt="slide4" height="400px" width="400px">
                        </div>
                    </div>
                </div>

                <!-- conton battons-->
                 <a href="#mycarousel" data-bs-slide="prev"
                 class="carousel-control-prev"
                 >
                    <span class="carousel-control-prev-icon bg-danger"></span>
                 </a>
                 <a href="#mycarousel" 
                 data-bs-slide="next"
                 
                 class="carousel-control-next">
                    <span class="carousel-control-next-icon bg-danger"></span>
                 </a>

            </div>
        </div>

    </section>
</body>
</html>
